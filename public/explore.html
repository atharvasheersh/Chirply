<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore | Chirply</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="light" data-page="explore">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Chirp<span>ly</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="feed.html">Feed</a>
        <a href="create.html">Write</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="top-actions">
        <a class="pill-btn" href="login.html">Login</a>
      </div>
    </header>

    <main class="page">
      <section class="page-head">
        <div>
          <h1>Explore Topics</h1>
          <p class="muted">Browse posts by topic and see what is trending.</p>
        </div>
        <input id="exploreSearch" type="search" placeholder="Search topics or keywords..." />
      </section>

      <section class="layout-two">
        <div>
          <div class="chips" id="topicChips"></div>
          <div id="exploreGrid" class="grid-2 cards-section"></div>
          <p id="exploreEmpty" class="muted hidden">No topics matched your filters.</p>
        </div>

        <aside class="side-panel">
          <div class="panel-card">
            <h3>Trending Today</h3>
            <ol class="clean-list ordered" id="trendingTopics"></ol>
          </div>
          <div class="panel-card">
            <h3>Feature</h3>
            <p class="muted small">Shows topic filtering, opens a post and you can add a comment to demonstrate discovery plus engagement.</p>
          </div>
        </aside>
      </section>
    </main>

    <footer class="footer">
      <p>Chirply</p>
    </footer>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
